<VirtualHost *:80>
    ServerName beta.entfernungsspiel.tianalorenz.de
    ServerAlias beta.enfernungsspiel.tianalorenz.de

    RewriteEngine On
    RewriteRule ^ https://beta.entfernungsspiel.tianalorenz.de%{REQUEST_URI} [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/entfernungsspiel-beta-error.log
    CustomLog ${APACHE_LOG_DIR}/entfernungsspiel-beta-access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName beta.entfernungsspiel.tianalorenz.de
    ServerAlias beta.enfernungsspiel.tianalorenz.de

    SSLEngine on
    # The cert MUST include both SANs:
    # beta.entfernungsspiel.tianalorenz.de and beta.enfernungsspiel.tianalorenz.de
    SSLCertificateFile /etc/letsencrypt/live/beta.entfernungsspiel.tianalorenz.de/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/beta.entfernungsspiel.tianalorenz.de/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # Enforce HTTPS for all future requests (2 years, includes subdomains)
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass /ws ws://127.0.0.1:9001/ws retry=0 timeout=120
    ProxyPassReverse /ws ws://127.0.0.1:9001/ws

    ProxyPass / http://127.0.0.1:9001/ retry=0 timeout=120
    ProxyPassReverse / http://127.0.0.1:9001/
    RequestHeader set X-Forwarded-Proto "https"

    # Canonical redirect for typo host after successful TLS handshake
    RewriteEngine On
    RewriteCond %{HTTP_HOST} =beta.enfernungsspiel.tianalorenz.de [NC]
    RewriteRule ^ https://beta.entfernungsspiel.tianalorenz.de%{REQUEST_URI} [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/entfernungsspiel-beta-error.log
    CustomLog ${APACHE_LOG_DIR}/entfernungsspiel-beta-access.log combined
</VirtualHost>
</IfModule>
 