<VirtualHost *:80>
    ServerName beta.entfernungsspiel.tianalorenz.de
    Redirect permanent / https://beta.entfernungsspiel.tianalorenz.de/
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName beta.entfernungsspiel.tianalorenz.de

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/beta.entfernungsspiel.tianalorenz.de/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/beta.entfernungsspiel.tianalorenz.de/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"

    ProxyPass /ws ws://127.0.0.1:9001/ws retry=0 timeout=120
    ProxyPassReverse /ws ws://127.0.0.1:9001/ws

    ProxyPass / http://127.0.0.1:9001/ retry=0 timeout=120
    ProxyPassReverse / http://127.0.0.1:9001/

    ErrorLog ${APACHE_LOG_DIR}/entfernungsspiel-beta-error.log
    CustomLog ${APACHE_LOG_DIR}/entfernungsspiel-beta-access.log combined
</VirtualHost>
</IfModule>