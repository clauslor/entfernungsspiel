

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kilometer Knobelei - Guess the Distance Game</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">🌍 Kilometer Knobelei</h1>
                <p class="subtitle">Guess the distance between two cities!</p>
            </div>
        </header>

        <!-- Main Game Container -->
        <main class="game-layout">
            <!-- Left Column: Player Setup & Game Question -->
            <div class="game-column">
                <!-- Player Setup Card -->
                <section class="card player-setup">
                    <h2 class="card-title">👤 Player Setup</h2>
                    <div class="input-group">
                        <input type="text" id="playerName" class="input-field" placeholder="Enter your name">
                        <button onclick="setPlayerName()" class="btn btn-primary">Join Game</button>
                    </div>
                    <div class="button-group">
                        <button onclick="setReady()" class="btn btn-success">✓ Ready</button>
                        <button onclick="removePlayer()" class="btn btn-danger">✕ Leave</button>
                    </div>
                </section>

                <!-- Question Card -->
                <section class="card question-card">
                    <h2 class="card-title">❓ Current Question</h2>
                    <div class="question-content">
                        <p class="question-text">What is the distance between:</p>
                        <div class="cities-container">
                            <div class="city city-from">
                                <div id="city1" class="city-name">-</div>
                            </div>
                            <div class="city-separator">↔</div>
                            <div class="city city-to">
                                <div id="city2" class="city-name">-</div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Answer Input Card -->
                <section class="card answer-card">
                    <h2 class="card-title">📍 Your Answer</h2>
                    <div class="input-group">
                        <input type="number" id="guessInput" class="input-field" placeholder="Distance in km" min="0">
                        <button onclick="sendGuess()" class="btn btn-primary">Submit Answer</button>
                    </div>
                </section>
            </div>

            <!-- Right Column: Game Info & Messages -->
            <div class="info-column">
                <!-- Countdown Card -->
                <section class="card countdown-card">
                    <h2 class="card-title">⏱️ Game Status</h2>
                    <div id="countdownDisplay" class="status-display">
                        <p id="countdownText" class="status-text">Waiting to start...</p>
                        <div id="countdown" class="countdown-timer"></div>
                    </div>
                </section>

                <!-- Rules Card -->
                <section class="card rules-card">
                    <h2 class="card-title">⚙️ Settings</h2>
                    <p id="rulesText" class="settings-text">Waiting for game settings...</p>
                </section>

                <!-- Players Card -->
                <section class="card players-card">
                    <h2 class="card-title">👥 Players Online</h2>
                    <ul id="playerList" class="player-list"></ul>
                </section>

                <!-- Messages Card -->
                <section class="card messages-card">
                    <h2 class="card-title">💬 Game Chat</h2>
                    <div id="messages" class="messages-container"></div>
                </section>
            </div>
        </main>
    </div>

    <script>
        let ws;
        let playerName = "";
        let totalTime;
        function connect() {
            ws = new WebSocket(`ws://${window.location.host}/ws`);

            ws.onmessage = (event) => {
                const data = event.data;
                try {
                    const msg = JSON.parse(data);
                    handleJsonMessage(msg);
                } catch {
                    appendMessage(data);
                }
            };

            ws.onopen = () => {
                if (playerName) {
                    ws.send(JSON.stringify({ type: "set_name", name: playerName }));
                }
            };
        }

        function handleJsonMessage(msg) {
            if (msg.type === "new_question") {
                appendMessage(`🟡 Runde ${msg.round}/${msg.max_rounds}: ${msg.question}`);
                document.getElementById("city1").textContent = `${msg.cities[0]}`;
                document.getElementById("city2").textContent = `${msg.cities[1]}`;
                
            } else if (msg.type === "view_config") {
                document.getElementById("rulesText").textContent = `Einstellungen Wir spielen: ${JSON.stringify(msg.max_rounds)} Runden | Je Runde habt ihr habt ${msg.answer_time} Sekunden Zeit zu antworten.`;
                totalTime = msg.answer_time;
            } else if (msg.type === "answer_received") {
                appendMessage(`✅ ${msg.player} hat geantwortet: ${msg.guess} km`);
            } else if (msg.type === "score_update") {
                appendMessage(`🏆 Punktestand: ${JSON.stringify(msg.scores)} | Highscore: ${msg.high_score}`);
            } else if (msg.type === "player_list") {
                updatePlayerList(msg.players);
            } else if (msg.type === "countdown") {
                document.getElementById("countdownText").textContent = `Spiel startet in ${msg.value}...`;
            }else if (msg.type === "countdown_round") {
                document.getElementById("countdownText").textContent = `Verbleibende Zeit zu antworten ${msg.value} Sekunden...`;
                document.getElementById("countdown").textContent = `${msg.value}`;

                timeLeft = msg.value;

                // Farbe berechnen: von Grün (120°) zu Rot (0°)
                const hue = (timeLeft / totalTime) * 120;
                document.getElementById('countdown').style.backgroundColor = `hsl(${hue}, 100%, 50%)`;

            } else if (msg.type === "game_start") {
                document.getElementById("countdownText").textContent = "Los geht's!";
            }
                            

        }

        function updatePlayerList(players) {
            const list = document.getElementById("playerList");
            list.innerHTML = "";
            players.forEach(p => {
                const item = document.createElement("li");
                item.textContent = `${p.name} (${p.ready ? "bereit" : "nicht bereit"})`;
                list.appendChild(item);
            });
        }

        function appendMessage(text) {
            const msg = document.createElement("p");
            msg.textContent = text;
            document.getElementById("messages").appendChild(msg);
        }

        function setPlayerName() {
            const nameInput = document.getElementById("playerName").value.trim();
            if (!nameInput) return alert("Name darf nicht leer sein.");
            playerName = nameInput;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "set_name", name: playerName }));
            } else {
                connect();
            }
        }

        function setReady() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "set_ready" }));
            }
        }

        function removePlayer() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "remove_player" }));
                ws.close();
            }
            appendMessage("Spieler entfernt.");
        }

        function sendGuess() {
            const guess = document.getElementById("guessInput").value;
            if (ws && ws.readyState === WebSocket.OPEN && guess) {
                ws.send(guess);
            }
        }

        window.onload = connect;
    </script>
</body>
</html>
