<!-- CAPTCHA Modal Template -->
<div id="captchaModal" class="captcha-modal">
    <div class="captcha-modal-content">
        <h2 class="captcha-title" data-i18n="captcha.title">🤖 Security Check</h2>
        <p class="captcha-description" data-i18n="captcha.description">Please answer this question to continue:</p>
        
        <div class="captcha-question-box">
            <p class="captcha-question" id="captchaQuestion">Loading...</p>
        </div>
        
        <div class="captcha-input-group">
            <input 
                type="number" 
                id="captchaAnswer" 
                class="captcha-input" 
                placeholder="Your answer"
                data-i18n="captcha.placeholder"
                autocomplete="off"
            >
            <button onclick="submitCaptcha()" class="btn btn-primary captcha-submit" data-i18n="captcha.submit">
                Submit Answer
            </button>
        </div>
        
        <div id="captchaError" class="captcha-error"></div>
        
        <p class="captcha-info" data-i18n="captcha.info">This verification is valid for 24 hours.</p>
    </div>
</div>
