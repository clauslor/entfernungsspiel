<section class="card countdown-card" id="countdownCard">
    <h2 class="card-title" data-i18n="countdown.title">⏱️ Game Status</h2>
    <div id="speedRoundBanner" class="speed-round-banner" hidden>
        ⚡ Speed Round!
    </div>
    <div id="countdownDisplay" class="status-display">
        <p id="countdownText" class="status-text" data-i18n="countdown.waiting">Waiting to start...</p>
        <div id="countdown" class="countdown-timer"></div>
    </div>
    <div id="roundHighlights" class="round-highlights" aria-live="polite">
        <p class="round-highlights-title">Runden-Highlights</p>
        <div id="roundHighlightsList" class="round-highlights-list"></div>
    </div>
</section>
