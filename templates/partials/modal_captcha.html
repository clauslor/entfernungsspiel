<div id="captchaModal" class="captcha-modal">
    <div class="captcha-modal-content">
        <h2 class="captcha-title" data-i18n="captcha.title">🔒 Security Verification</h2>
        <p class="captcha-description" data-i18n="captcha.description">Please verify that you are human:</p>

        <div id="hcaptcha-widget" class="h-captcha" data-sitekey="{{ hcaptcha_site_key }}"></div>

        <button onclick="submitCaptcha()" class="btn btn-primary captcha-submit" data-i18n="captcha.submit">Continue</button>

        <div id="captchaError" class="captcha-error"></div>
        <p class="captcha-info" data-i18n="captcha.info">This verification is valid for 24 hours.</p>
    </div>
</div>
