<section class="card rules-card" id="rulesCard">
    <h2 class="card-title" data-i18n="settings.title">⚙️ Settings</h2>
    <p id="rulesText" class="settings-text" data-i18n="settings.waiting">Waiting for game settings...</p>
    <div id="hostSettingsEditor" class="host-settings-editor" aria-live="polite">
        <h3 class="host-settings-title" data-i18n="settings.editorTitle">Spiel-Einstellungen (Host)</h3>
        <div class="question-type-section">
            <p class="question-type-title" data-i18n="settings.questionTypesTitle">Fragetypen</p>
            <div class="question-type-carousel" role="group" aria-label="Fragetypen aktivieren oder deaktivieren">
                <button type="button" id="tileAirQuestions" class="question-type-tile is-active" onclick="toggleQuestionTypeTile('air')" aria-pressed="true">
                    <span class="question-type-emoji">🛫</span>
                    <span class="question-type-name" data-i18n="settings.questionTypeAir">Luftlinie</span>
                </button>
                <button type="button" id="tileAirMapQuestions" class="question-type-tile is-active" onclick="toggleQuestionTypeTile('air_map')" aria-pressed="true">
                    <span class="question-type-emoji">🗺️</span>
                    <span class="question-type-name" data-i18n="settings.questionTypeAirMap">Karte</span>
                </button>
                <button type="button" id="tileRoadQuestions" class="question-type-tile is-active" onclick="toggleQuestionTypeTile('road')" aria-pressed="true">
                    <span class="question-type-emoji">🛣️</span>
                    <span class="question-type-name" data-i18n="settings.questionTypeRoad">Straße</span>
                </button>
                <button type="button" id="tileSortingQuestions" class="question-type-tile is-active" onclick="toggleQuestionTypeTile('sorting')" aria-pressed="true">
                    <span class="question-type-emoji">🧠</span>
                    <span class="question-type-name" data-i18n="settings.questionTypePubQuiz">Kneipenquiz</span>
                </button>
                <button type="button" id="tileSpeedRounds" class="question-type-tile is-active" onclick="toggleQuestionTypeTile('speed')" aria-pressed="true">
                    <span class="question-type-emoji">⚡</span>
                    <span class="question-type-name" data-i18n="settings.questionTypeSpeed">Speed</span>
                </button>
            </div>
            <input type="checkbox" id="settingEnableAirQuestions" onchange="debouncedSaveSettings()" hidden>
            <input type="checkbox" id="settingEnableAirMapQuestions" onchange="debouncedSaveSettings()" hidden>
            <input type="checkbox" id="settingEnableRoadQuestions" onchange="debouncedSaveSettings()" hidden>
            <input type="checkbox" id="settingEnableSortingQuestions" onchange="debouncedSaveSettings()" hidden>
            <input type="checkbox" id="settingEnableSpeedRounds" onchange="debouncedSaveSettings()" hidden>
        </div>
        <div class="host-settings-grid">
            <label class="host-settings-field">
                <span data-i18n="settings.maxRoundsLabel">Max. Runden</span>
                <input type="number" id="settingMaxRounds" min="1" max="20" step="1"
                    inputmode="numeric" onchange="debouncedSaveSettings()">
                <span class="field-hint">1 – 20</span>
            </label>
            <label class="host-settings-field">
                <span data-i18n="settings.countdownLabel">Countdown (s)</span>
                <input type="number" id="settingCountdown" min="1" max="30" step="1"
                    inputmode="numeric" onchange="debouncedSaveSettings()">
                <span class="field-hint">1 – 30 s</span>
            </label>
            <label class="host-settings-field">
                <span data-i18n="settings.answerTimeLabel">Antwortzeit (s)</span>
                <input type="number" id="settingAnswerTime" min="5" max="180" step="1"
                    inputmode="numeric" onchange="debouncedSaveSettings()">
                <span class="field-hint">5 – 180 s</span>
                <label id="noTimeLimitRow" class="no-time-limit-row">
                    <input type="checkbox" id="settingNoTimeLimit" onchange="debouncedSaveSettings()">
                    <span data-i18n="settings.noTimeLimitLabel">Kein Zeitlimit</span>
                </label>
            </label>
            <label class="host-settings-field">
                <span data-i18n="settings.pauseTimeLabel">Pause zwischen Runden (s)</span>
                <input type="number" id="settingPauseTime" min="1" max="30" step="1"
                    inputmode="numeric" onchange="debouncedSaveSettings()">
                <span class="field-hint">1 – 30 s</span>
            </label>
        </div>
        <div class="host-settings-options">
            <label class="host-settings-toggle">
                <input type="checkbox" id="settingAutoAdvanceAllAnswered" onchange="debouncedSaveSettings()">
                <span data-i18n="settings.autoAdvanceAllAnsweredLabel">Wenn alle geantwortet haben,
                    sofort nächste Frage starten</span>
            </label>
            <label class="host-settings-toggle">
                <input type="checkbox" id="settingFirstAnswerEndsRound" onchange="debouncedSaveSettings()">
                <span data-i18n="settings.firstAnswerEndsRoundLabel">Erste Antwort beendet die
                    Runde</span>
            </label>
            <label class="host-settings-toggle">
                <input type="checkbox" id="settingWrongAnswerPointsOthers" onchange="debouncedSaveSettings()">
                <span data-i18n="settings.wrongAnswerPointsOthersLabel">Falsche Antworten geben allen
                    anderen je 1 Punkt</span>
            </label>
            <label class="host-settings-toggle">
                <input type="checkbox" id="settingKickOnDisconnect" onchange="debouncedSaveSettings()">
                <span data-i18n="settings.kickOnDisconnectLabel">Spieler wird gekickt wenn er das Tab
                    schließt (statt Pause)</span>
            </label>
        </div>
    </div>
</section>
