

<!DOCTYPE html>
<html>
<head>
    <title>Entfernungsspiel</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        #messages, #players, #countdownDisplay {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }
        #messages { height: 150px; overflow-y: scroll; }
        input, button, select { margin: 5px; }
    </style>
</head>
<body>
    <h1>Entfernungsspiel</h1>

    <div>
        <label>Spielername:</label>
        <input type="text" id="playerName" placeholder="Name eingeben">
        <button onclick="setPlayerName()">Hinzufügen / Ändern</button>
        <button onclick="removePlayer()">Entfernen</button>
        <button onclick="setReady()">Bereit</button>
    </div>

    <div id="players">
        <h3>Spielerliste</h3>
        <ul id="playerList"></ul>
    </div>

    <div id="countdownDisplay">
        <h3>Countdown</h3>
        <p id="countdownText">Warte auf Start...</p>
    </div>

    <div>
        <label>Antwort (km):</label>
        <input type="number" id="guessInput">
        <button onclick="sendGuess()">Antwort senden</button>
    </div>

    <div id="messages"></div>

    <script>
        let ws;
        let playerName = "";

        function connect() {
            ws = new WebSocket("ws://localhost:8000/ws");

            ws.onmessage = (event) => {
                const data = event.data;
                try {
                    const msg = JSON.parse(data);
                    handleJsonMessage(msg);
                } catch {
                    appendMessage(data);
                }
            };

            ws.onopen = () => {
                if (playerName) {
                    ws.send(JSON.stringify({ type: "set_name", name: playerName }));
                }
            };
        }

        function handleJsonMessage(msg) {
            if (msg.type === "new_question") {
                appendMessage(`🟡 Runde ${msg.round}/${msg.max_rounds}: ${msg.question}`);
            } else if (msg.type === "answer_received") {
                appendMessage(`✅ ${msg.player} hat geantwortet: ${msg.guess} km`);
            } else if (msg.type === "score_update") {
                appendMessage(`🏆 Punktestand: ${JSON.stringify(msg.scores)} | Highscore: ${msg.high_score}`);
            } else if (msg.type === "player_list") {
                updatePlayerList(msg.players);
            } else if (msg.type === "countdown") {
                document.getElementById("countdownText").textContent = `Spiel startet in ${msg.value}...`;
            } else if (msg.type === "game_start") {
                document.getElementById("countdownText").textContent = "Los geht's!";
            }
        }

        function updatePlayerList(players) {
            const list = document.getElementById("playerList");
            list.innerHTML = "";
            players.forEach(p => {
                const item = document.createElement("li");
                item.textContent = `${p.name} (${p.ready ? "bereit" : "nicht bereit"})`;
                list.appendChild(item);
            });
        }

        function appendMessage(text) {
            const msg = document.createElement("p");
            msg.textContent = text;
            document.getElementById("messages").appendChild(msg);
        }

        function setPlayerName() {
            const nameInput = document.getElementById("playerName").value.trim();
            if (!nameInput) return alert("Name darf nicht leer sein.");
            playerName = nameInput;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "set_name", name: playerName }));
            } else {
                connect();
            }
        }

        function setReady() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "set_ready" }));
            }
        }

        function removePlayer() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "remove_player" }));
                ws.close();
            }
            appendMessage("Spieler entfernt.");
        }

        function sendGuess() {
            const guess = document.getElementById("guessInput").value;
            if (ws && ws.readyState === WebSocket.OPEN && guess) {
                ws.send(guess);
            }
        }

        window.onload = connect;
    </script>
</body>
</html>
