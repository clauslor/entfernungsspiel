name: Deploy Beta to Production

on:
  push:
    branches:
      - beta

jobs:
  deploy:
    name: SSH Deploy Beta
    runs-on: ubuntu-latest

    steps:
      - name: Deploy beta via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/entfernungsspiel-beta

            BEFORE=$(git rev-parse HEAD)
            git fetch origin beta
            git checkout beta
            git pull --ff-only origin beta
            AFTER=$(git rev-parse HEAD)

            if [ "$BEFORE" = "$AFTER" ]; then
              echo "Beta already up to date."
              exit 0
            fi

            echo "Beta deployed $BEFORE -> $AFTER"

            if git diff --name-only "$BEFORE" "$AFTER" | grep -q "requirements.txt"; then
              echo "Installing updated beta dependencies..."
              .venv/bin/pip install --quiet -r requirements.txt
            fi

            sudo systemctl restart entfernungsspiel-beta
            echo "Beta service restarted successfully."